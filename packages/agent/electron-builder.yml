appId: com.timetracker.agent
productName: TimeTracker
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - native_modules/**/*
  - package.json
  - "!node_modules"
extraMetadata:
  main: out/main/main.js
asar: true
asarUnpack:
  - "native_modules/**/*.node"
npmRebuild: false
mac:
  category: public.app-category.productivity
  target:
    - dmg
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target:
    - nsis
linux:
  target:
    - AppImage
publish:
  provider: generic
  url: https://releases.timetracker.app
