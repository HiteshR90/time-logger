appId: com.timetracker.agent
productName: TimeTracker
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - native_modules/**/*
  - package.json
  - "!node_modules"
extraMetadata:
  main: out/main/main.js
asar: true
asarUnpack:
  - "native_modules/**/*"
npmRebuild: false

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.png

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: generic
  url: https://releases.timetracker.app
