<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeTracker</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
      .container { max-width: 360px; margin: 0 auto; }
      h1 { font-size: 20px; margin-bottom: 20px; text-align: center; }
      .form-group { margin-bottom: 16px; }
      label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
      input, select { width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #e2e8f0; font-size: 14px; transition: opacity 0.2s; }
      input:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }
      button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
      .btn-primary { background: #3b82f6; color: white; }
      .btn-primary:hover { background: #2563eb; }
      .btn-danger { background: #ef4444; color: white; }
      .btn-danger:hover { background: #dc2626; }
      .btn-secondary { background: #475569; color: white; }
      .status { text-align: center; padding: 12px; border-radius: 6px; margin: 16px 0; font-size: 13px; }
      .status.tracking { background: #166534; color: #86efac; }
      .status.stopped { background: #1e293b; color: #94a3b8; }
      .timer { font-size: 36px; font-weight: 700; text-align: center; margin: 20px 0; font-variant-numeric: tabular-nums; }
      .error { color: #fca5a5; font-size: 13px; margin-top: 8px; }
      .success { color: #86efac; font-size: 13px; margin-top: 8px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Login Screen -->
      <div id="login-screen">
        <h1>TimeTracker</h1>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="login-btn">Sign In</button>
        <div id="login-error" class="error hidden"></div>
      </div>

      <!-- Tracker Screen -->
      <div id="tracker-screen" class="hidden">
        <h1>TimeTracker</h1>
        <!-- Permission banner -->
        <div id="permission-banner" class="hidden" style="background:#7f1d1d;color:#fca5a5;padding:10px;border-radius:6px;margin-bottom:12px;font-size:13px;">
          <strong>Screen Recording permission required.</strong><br>
          <span style="font-size:12px;color:#fecaca;">Grant permission to capture screenshots and track app usage.</span><br>
          <button id="open-settings-btn" style="margin-top:6px;padding:6px 12px;background:#dc2626;color:white;border:none;border-radius:4px;font-size:12px;cursor:pointer;">Open System Settings</button>
        </div>
        <div id="user-info" class="status stopped"></div>
        <div class="form-group">
          <label>Project</label>
          <select id="project-select">
            <option value="">Select a project...</option>
          </select>
        </div>
        <div class="form-group">
          <label>What are you working on?</label>
          <input type="text" id="task-description" placeholder="e.g. Bug fix for login page..." />
        </div>
        <div class="timer" id="timer">00:00:00</div>
        <div id="tracking-status" class="status stopped">Not tracking</div>
        <button class="btn-primary" id="start-btn">Start Tracking</button>
        <button class="btn-danger hidden" id="stop-btn">Stop Tracking</button>
        <button class="btn-secondary" id="logout-btn" style="margin-top: 16px;">Logout</button>
      </div>
    </div>

    <script>
      const API_BASE = 'http://localhost:5080';
      let accessToken = localStorage.getItem('agent_token');
      let currentUser = null;
      let tracking = false;
      let timerSeconds = 0;
      let timerInterval = null;

      const $ = (id) => document.getElementById(id);

      // IPC for main process communication (tracking start/stop)
      const { ipcRenderer } = require('electron');

      // Direct API calls for auth/data
      async function apiCall(path, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
        const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
        return res.json();
      }

      function updateTimer() {
        const h = Math.floor(timerSeconds / 3600).toString().padStart(2, '0');
        const m = Math.floor((timerSeconds % 3600) / 60).toString().padStart(2, '0');
        const s = (timerSeconds % 60).toString().padStart(2, '0');
        $('timer').textContent = `${h}:${m}:${s}`;
      }

      function showScreen(screen) {
        $('login-screen').classList.toggle('hidden', screen !== 'login');
        $('tracker-screen').classList.toggle('hidden', screen !== 'tracker');
        if (screen === 'tracker') checkPermission();
      }

      async function loadProjects() {
        const result = await apiCall('/projects');
        if (result.success) {
          const select = $('project-select');
          select.innerHTML = '<option value="">Select a project...</option>';
          result.data.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name;
            select.appendChild(opt);
          });
        }
      }

      // Login
      $('login-btn').addEventListener('click', async () => {
        const email = $('email').value;
        const password = $('password').value;
        if (!email || !password) return;

        $('login-error').classList.add('hidden');
        $('login-btn').textContent = 'Signing in...';
        $('login-btn').disabled = true;

        try {
          const result = await apiCall('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password }),
          });

          if (result.success) {
            accessToken = result.data.accessToken;
            localStorage.setItem('agent_token', accessToken);
            localStorage.setItem('agent_refresh', result.data.refreshToken);
            localStorage.setItem('agent_user', JSON.stringify(result.data.user));
            currentUser = result.data.user;
            // Pass tokens to main process for API calls (screenshots, sync)
            await ipcRenderer.invoke('auth:set-tokens', accessToken, result.data.refreshToken, currentUser);
            $('user-info').textContent = `Logged in as ${currentUser.name}`;
            showScreen('tracker');
            loadProjects();
          } else {
            $('login-error').textContent = result.error || 'Login failed';
            $('login-error').classList.remove('hidden');
          }
        } catch (err) {
          $('login-error').textContent = 'Cannot connect to API server. Is it running?';
          $('login-error').classList.remove('hidden');
        }

        $('login-btn').textContent = 'Sign In';
        $('login-btn').disabled = false;
      });

      // Start tracking — triggers main process sync via IPC
      $('start-btn').addEventListener('click', async () => {
        const projectId = $('project-select').value;
        if (!projectId) return alert('Select a project first');

        // Tell main process to start monitoring (screenshots, input, app tracking, sync)
        const result = await ipcRenderer.invoke('tracking:start', currentUser.id, projectId);
        if (!result.success) {
          $('tracking-status').textContent = 'Failed to start: ' + (result.error || 'unknown');
          return;
        }

        tracking = true;
        timerSeconds = 0;
        timerInterval = setInterval(() => { timerSeconds++; updateTimer(); }, 1000);
        $('start-btn').classList.add('hidden');
        $('stop-btn').classList.remove('hidden');
        $('project-select').disabled = true;
        $('task-description').disabled = true;
        $('tracking-status').className = 'status tracking';
        $('tracking-status').textContent = 'Tracking...';
      });

      // Stop tracking — stops main process sync
      $('stop-btn').addEventListener('click', async () => {
        await ipcRenderer.invoke('tracking:stop');
        tracking = false;
        clearInterval(timerInterval);
        $('start-btn').classList.remove('hidden');
        $('stop-btn').classList.add('hidden');
        $('project-select').disabled = false;
        $('task-description').disabled = false;
        $('tracking-status').className = 'status stopped';
        $('tracking-status').textContent = 'Not tracking';
      });

      // Logout
      $('logout-btn').addEventListener('click', async () => {
        if (tracking) { await ipcRenderer.invoke('tracking:stop'); tracking = false; clearInterval(timerInterval); }
        accessToken = null;
        currentUser = null;
        localStorage.removeItem('agent_token');
        localStorage.removeItem('agent_refresh');
        showScreen('login');
      });

      // Check Screen Recording permission
      async function checkPermission() {
        try {
          const perms = await ipcRenderer.invoke('permissions:check');
          if (!perms.screenRecording) {
            $('permission-banner').classList.remove('hidden');
            $('start-btn').disabled = true;
            $('start-btn').textContent = 'Permission Required';
          } else {
            $('permission-banner').classList.add('hidden');
            $('start-btn').disabled = false;
            $('start-btn').textContent = 'Start Tracking';
          }
        } catch {}
      }

      $('open-settings-btn').addEventListener('click', () => {
        ipcRenderer.invoke('permissions:open-settings');
      });

      // Re-check permission every 5 seconds (user might grant it while app is open)
      setInterval(checkPermission, 5000);

      // Check main process for stored session (persists across restarts)
      ipcRenderer.invoke('auth:get-stored-session').then(session => {
        if (session.loggedIn) {
          accessToken = session.accessToken;
          currentUser = session.user;
          $('user-info').textContent = `Logged in as ${currentUser.name}`;
          showScreen('tracker');
          loadProjects();
        }
      }).catch(() => {
        // Main process not ready, stay on login
      });

      // Allow Enter key to submit login
      $('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') $('login-btn').click();
      });
    </script>
  </body>
</html>
